<form>
    <label for="title">Title</label>
    <input formControlName="title" placeholder="Event Title"/>

    <label for="category">Category</label>
    <input formControlName="category" placeholder="Category" />

    <label for="isImportant">Important</label>
    <input formControlName="isImportant" type="checkbox" /> 

    <label for="location">Location</label>
    <input formControlName="location" placeholder="Location" />

    <label for="url">URL</label>
    <input formControlName="url" placeholder="URL" />

    <label for="details">Details</label>
    <textarea formControlName="details" placeholder="Details"></textarea>

    <label for="startDate">Start Date</label>
    <input formControlName="startDate" type="datetime-local" />

    <label for="endDate">End Date</label>
    <input formControlName="endDate" type="datetime-local" />
    
    <button type="submit">Add Event</button>
</form>
